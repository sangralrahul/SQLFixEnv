name: SQLDebugEnv
version: "1.0.0"
description: >
  An OpenEnv environment where AI agents fix broken SQL queries against a real
  SQLite database. 5 tasks from easy syntax errors to hard subqueries.
  Dense partial rewards from 4 correctness checks.

author: SANGRALRAHUL
tags:
  - openenv
  - sql
  - debugging
  - rl-training

sdk: docker

interface:
  reset:
    method: POST
    path: /reset
    request:
      task_id: {type: string, required: false}
    response:
      session_id: {type: string}
      observation: {type: object}

  step:
    method: POST
    path: /step
    request:
      session_id: {type: string, required: true}
      fixed_code: {type: string, required: true}
    response:
      observation: {type: object}
      reward: {type: float, range: [0.05, 0.95]}
      done: {type: boolean}
      info: {type: object}

  state:
    method: GET
    path: /state/{session_id}

action_space:
  type: text
  fields:
    fixed_code:
      type: string
      description: Corrected SQL query

observation_space:
  type: object
  fields:
    task_id:          {type: string}
    difficulty:       {type: string, enum: [easy, medium, hard]}
    buggy_code:       {type: string}
    task_description: {type: string}
    error_hint:       {type: string}
    schema:           {type: string}
    attempt:          {type: integer}
    max_attempts:     {type: integer}

reward:
  type: dense
  range: [0.05, 0.95]
  description: >
    4 checks: no SQL error (25%), correct row count (25%),
    correct columns (25%), data correctness (25%).

tasks:
  - id: easy_syntax
    difficulty: easy
    description: Fix SELCT/GRUP syntax errors
  - id: easy_filter
    difficulty: easy
    description: Fix reversed WHERE condition
  - id: medium_aggregate
    difficulty: medium
    description: Fix SUM vs AVG aggregation
  - id: medium_join
    difficulty: medium
    description: Fix wrong JOIN condition
  - id: hard_subquery
    difficulty: hard
    description: Fix correlated subquery wrong table

episode:
  max_steps: 5
