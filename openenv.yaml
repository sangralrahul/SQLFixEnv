name: SQLFixEnv
version: "2.0.0"
description: >
  An advanced reinforcement learning environment where AI agents fix broken SQL queries
  against a real multi-table SQLite database. Features 5 difficulty levels (easy → master),
  partial reward scoring, multi-table JOINs, subqueries, CTEs, and window functions.

author: SANGRALRAHUL
license: MIT
tags:
  - sql
  - reinforcement-learning
  - nlp
  - code-repair
  - database
  - openenv

environment:
  type: text
  action_space: natural_language_sql
  observation_space: structured_text

difficulty_levels:
  - easy: "Single table queries, keyword typos"
  - medium: "WHERE clauses, GROUP BY, HAVING, aggregations"
  - hard: "Multi-table JOINs, table/column name errors"
  - expert: "Subqueries, complex multi-joins"
  - master: "CTEs, window functions, PARTITION BY"

reward:
  type: multi_dimensional
  max_reward: 1.0
  components:
    syntax: 0.5
    row_match: 0.3
    column_match: 0.2
  partial_credit: true

database:
  type: SQLite (in-memory)
  tables:
    - employees (10 rows)
    - departments (5 rows)
    - projects (5 rows)
    - assignments (11 rows)
    - salaries (10 rows)

tasks:
  total: 10
  per_level: 2
  max_steps_per_episode: 5

api:
  base_url: https://SANGRALRAHUL-sqlfixenv.hf.space
  endpoints:
    reset: POST /reset
    step: POST /step
    tasks: GET /tasks
    schema: GET /schema
    health: GET /health

endpoints:
  reset:
    method: POST
    path: /reset
    body:
      task_id: integer (optional, 1-10)
    returns: observation with broken query, level, description, hint

  step:
    method: POST
    path: /step
    body:
      action: string (SQL query to fix)
    returns: reward, reward_breakdown, feedback, agent_result, done

  tasks:
    method: GET
    path: /tasks
    returns: list of all 10 tasks with levels and hints

  schema:
    method: GET
    path: /schema
    returns: full database schema for all 5 tables
